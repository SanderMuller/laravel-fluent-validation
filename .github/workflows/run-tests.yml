name: run-tests

permissions:
  contents: read

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.4, 8.3, 8.2]
        laravel: [13.*, 12.*, 11.*]
        stability: [prefer-lowest, prefer-stable]
        exclude:
          - php: 8.2
            laravel: 13.*
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*
          - laravel: 11.*
            testbench: 9.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Cache PHPUnit results
        uses: actions/cache@v5
        with:
          path: .cache/phpunit/
          key: phpunit-cache-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ matrix.os }}-${{ hashFiles('tests/**') }}
          restore-keys: phpunit-cache-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ matrix.os }}-

      # Windows: run sequentially. Pest's parallel runner spawns workers
      # that race on Testbench's shared bootstrap/cache/*.php and
      # storage/framework/cache/* rename-swaps, which Windows denies
      # (`Access is denied (code: 5)`). Sequential execution eliminates
      # the race; the time cost is acceptable for a single matrix leg.
      - name: Execute tests (Windows — sequential to avoid file-rename race)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set +e
          vendor/bin/pest --ci 2>&1 | tee pest-output.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          # Livewire real-time-facade race — the stream wrapper for
          # `Facades\Livewire\...\GenerateSignedUploadUrl` occasionally
          # registers after `SupportFileUploads::provide()` on
          # `prefer-lowest` + certain Pest seeds. One retry with a fresh
          # seed resolves it; any other first-attempt failure fails the
          # job without retry.
          if grep -q 'Facades\\Livewire\\Features\\SupportFileUploads\\GenerateSignedUploadUrl' pest-output.log; then
            echo "::warning ::Livewire real-time-facade bootstrap race detected — retrying once with a fresh Pest seed"
            vendor/bin/pest --ci
          else
            echo "Test failure is not the known Livewire bootstrap race — failing without retry"
            exit "$status"
          fi

      # Non-Windows: parallel runner is safe and ~3x faster.
      - name: Execute tests (non-Windows — parallel)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set +e
          vendor/bin/pest --ci --parallel 2>&1 | tee pest-output.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if grep -q 'Facades\\Livewire\\Features\\SupportFileUploads\\GenerateSignedUploadUrl' pest-output.log; then
            echo "::warning ::Livewire real-time-facade bootstrap race detected — retrying once with a fresh Pest seed"
            vendor/bin/pest --ci --parallel
          else
            echo "Test failure is not the known Livewire bootstrap race — failing without retry"
            exit "$status"
          fi
