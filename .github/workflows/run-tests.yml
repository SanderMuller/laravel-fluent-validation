name: run-tests

permissions:
  contents: read

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.4, 8.3, 8.2]
        laravel: [13.*, 12.*, 11.*]
        stability: [prefer-lowest, prefer-stable]
        exclude:
          - php: 8.2
            laravel: 13.*
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*
          - laravel: 11.*
            testbench: 9.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Cache PHPUnit results
        uses: actions/cache@v5
        with:
          path: .cache/phpunit/
          key: phpunit-cache-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ matrix.os }}-${{ hashFiles('tests/**') }}
          restore-keys: phpunit-cache-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ matrix.os }}-

      # Retry *only* for known CI bootstrap races; any other failure
      # fails the job without retry so we don't mask seed-dependent
      # regressions. Currently retried:
      #
      #   1. Livewire real-time-facade race — `Facades\Livewire\...\
      #      GenerateSignedUploadUrl` not found because the stream
      #      wrapper registers after `SupportFileUploads::provide()`.
      #      Surfaces on `prefer-lowest` + random Pest seed orderings.
      #
      #   2. Testbench bootstrap/cache file-lock race (Windows) —
      #      `rename(...\bootstrap\cache\...\services.php): Access is
      #      denied (code: 5)` when parallel workers touch the same
      #      cached bootstrap file simultaneously.
      #
      # Both are environmental, order-dependent, and resolved by a
      # single re-run with a fresh seed + fresh process pool.
      - name: Execute tests
        shell: bash
        run: |
          set +e
          vendor/bin/pest --ci --parallel 2>&1 | tee pest-output.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if grep -qE 'Facades\\Livewire\\Features\\SupportFileUploads\\GenerateSignedUploadUrl|bootstrap[\\/]cache[\\/\\\\].*services\.php.*Access is denied' pest-output.log; then
            echo "::warning ::Known CI bootstrap race detected — retrying once with a fresh Pest seed"
            vendor/bin/pest --ci --parallel
          else
            echo "Test failure is not a known bootstrap race — failing without retry"
            exit "$status"
          fi
